<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ULTIMATE HABIT TRACKER</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">
    <h1>⚡ CYBER HABIT TRACKER</h1>

    <div class="top-bar">
        <div>
            <h3>🔥 Global Streak: <span id="globalStreak">0</span></h3>
            <h4>🏆 Longest: <span id="longestStreak">0</span></h4>
        </div>
        <button id="toggleTheme">Toggle Theme</button>
    </div>

    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="progressText">0% Complete</p>
    </div>

    <div class="habit-input">
        <input type="text" id="habitInput" placeholder="Add a new habit..." />
        <button onclick="addHabit()">Add</button>
    </div>

    <ul id="habitList"></ul>

    <div class="heatmap">
        <h3>Consistency Heatmap</h3>
        <div id="heatmapGrid"></div>
    </div>

    <div class="backup-section">
        <button onclick="exportData()">Export Backup</button>
        <input type="file" onchange="importData(event)">
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
