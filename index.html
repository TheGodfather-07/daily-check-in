<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      max-width: 500px;
      margin: 30px auto;
    }

    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #1e293b;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    .date {
      opacity: 0.7;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>🔥 Daily Check-In</h1>
  <div class="date" id="date"></div>

  <div class="container">
    <input type="text" id="taskInput" placeholder="Enter today's task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

<script>
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("date").innerText = "Date: " + today;

  function loadTasks() {
    const savedData = JSON.parse(localStorage.getItem("dailyTasks"));

    if (!savedData || savedData.date !== today) {
      localStorage.setItem("dailyTasks", JSON.stringify({
        date: today,
        tasks: []
      }));
      return [];
    }

    return savedData.tasks;
  }

  function saveTasks(tasks) {
    localStorage.setItem("dailyTasks", JSON.stringify({
      date: today,
      tasks: tasks
    }));
  }

  function renderTasks() {
    const tasks = loadTasks();
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      const li = document.createElement("li");
      li.innerHTML = `
        ${task}
        <span class="delete" onclick="deleteTask(${index})">X</span>
      `;
      list.appendChild(li);
    });
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();
    if (taskText === "") return;

    const tasks = loadTasks();
    tasks.push(taskText);
    saveTasks(tasks);
    input.value = "";
    renderTasks();
  }

  function deleteTask(index) {
    const tasks = loadTasks();
    tasks.splice(index, 1);
    saveTasks(tasks);
    renderTasks();
  }

  renderTasks();
</script>

</body>
</html>
